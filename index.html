<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>Aron's Morn Game</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

html, body {
  width: 100%; height: 100%;
  overflow: hidden;
  background: #0d0221;
  font-family: 'Arial Black', Arial, sans-serif;
  user-select: none;
}

/* ── Background ── */
body::before {
  content: '';
  position: fixed; inset: 0;
  background: radial-gradient(ellipse at 50% 0%, #1e0b4a 0%, #0d0221 65%);
  pointer-events: none; z-index: 0;
}

/* ── Game Screen ── */
#game-screen {
  position: relative; z-index: 1;
  display: flex; flex-direction: column;
  align-items: center; justify-content: space-between;
  height: 100dvh;
  padding: 0 10px env(safe-area-inset-bottom, 10px);
  max-width: 480px; margin: 0 auto;
}

/* ── Header ── */
#morn-header {
  width: 100%; text-align: center;
  padding: clamp(10px, 3vh, 20px) 0 0;
  flex-shrink: 0;
}

#morn-title {
  font-size: clamp(1.7rem, 7vw, 2.4rem);
  color: #ffd700;
  text-shadow: 0 0 20px #ff8c00, 0 0 45px #ff5500;
  letter-spacing: 4px;
  animation: morn-glow 2s ease-in-out infinite;
}
@keyframes morn-glow {
  0%,100% { text-shadow: 0 0 20px #ff8c00, 0 0 45px #ff5500; }
  50%      { text-shadow: 0 0 35px #ffbb00, 0 0 70px #ff8800; }
}

/* progress dots */
#morn-dots {
  display: flex; justify-content: center; gap: 6px;
  margin-top: 8px;
}
.dot {
  width: 8px; height: 8px; border-radius: 50%;
  background: rgba(255,200,50,0.2);
  border: 1px solid rgba(255,200,50,0.4);
  transition: background 0.3s;
}
.dot.done { background: #ffd700; box-shadow: 0 0 6px #ffaa00; }

/* ── Main game row ── */
#game-area {
  display: flex; align-items: center;
  justify-content: center;
  gap: clamp(8px, 3.5vw, 22px);
  width: 100%; flex: 1;
  padding: clamp(5px, 2vh, 15px) 0;
}

/* ── Choice columns ── */
.choice-col {
  display: flex; flex-direction: column;
  align-items: center; gap: 8px;
  flex: 1;
}

/* counter badge */
.choice-count {
  font-size: clamp(1.1rem, 5vw, 1.5rem);
  font-weight: bold; color: #fff;
  background: rgba(255,200,50,0.12);
  border: 1px solid rgba(255,200,50,0.35);
  border-radius: 30px;
  padding: 3px 14px; min-width: 48px;
  text-align: center;
  transition: transform 0.18s, color 0.18s;
}
.choice-count.bump { transform: scale(1.35); color: #ffd700; }

/* icon button */
.icon-btn {
  position: relative;
  display: flex; align-items: center; justify-content: center;
  width: clamp(82px, 22vw, 112px);
  height: clamp(82px, 22vw, 112px);
  border-radius: 22px;
  background: linear-gradient(160deg, #2c1666, #180a3d);
  border: 2px solid rgba(255,200,50,0.35);
  box-shadow:
    0 7px 0 rgba(0,0,0,0.55),
    0 10px 18px rgba(0,0,0,0.45),
    inset 0 1px 0 rgba(255,255,255,0.12);
  cursor: pointer;
  font-size: clamp(38px, 11vw, 58px);
  transition: transform 0.08s, box-shadow 0.08s;
  touch-action: manipulation;
}
.icon-btn.pressed,
.icon-btn:active {
  transform: translateY(5px) scale(0.94);
  box-shadow:
    0 2px 0 rgba(0,0,0,0.55),
    0 3px 8px rgba(0,0,0,0.4),
    inset 0 2px 4px rgba(0,0,0,0.3);
}

.icon-label {
  font-size: clamp(0.95rem, 4vw, 1.25rem);
  font-weight: 900; letter-spacing: 1px;
  color: #ff9933;
  text-shadow: 0 0 10px #ff6600;
  text-transform: uppercase;
}

/* ── Fire effects on icon ── */
.fire-ring {
  position: absolute; inset: -10px;
  border-radius: 32px;
  pointer-events: none; display: none;
}
.fire-ring.active {
  display: block;
  animation: fire-pulse 0.35s ease-in-out infinite alternate;
}
@keyframes fire-pulse {
  from { box-shadow: 0 0 16px 6px #ff4400, 0 0 32px 12px rgba(255,100,0,.55); }
  to   { box-shadow: 0 0 28px 12px #ff8800, 0 0 55px 22px rgba(255,160,0,.65); }
}

.fire-emojis {
  position: absolute; inset: -22px;
  pointer-events: none; display: none;
}
.fire-emojis.active {
  display: block;
  animation: spin 1.4s linear infinite;
}
@keyframes spin {
  to { transform: rotate(360deg); }
}
.fire-em {
  position: absolute; font-size: 21px;
  top: 50%; left: 50%;
}

/* ── Aron face ── */
#aron-col { flex: 0 0 auto; }

#aron-wrap {
  position: relative;
  width: clamp(128px, 34vw, 168px);
  height: clamp(128px, 34vw, 168px);
}

#aron-img {
  width: 100%; height: 100%;
  object-fit: cover;
  object-position: center 18%;
  border-radius: 50%;
  border: 3px solid #ffd700;
  box-shadow: 0 0 28px rgba(255,165,0,.45), 0 0 55px rgba(255,80,0,.2);
  display: block;
}

#aron-fallback {
  display: none;
  width: 100%; height: 100%;
  border-radius: 50%;
  border: 3px solid #ffd700;
  background: linear-gradient(135deg, #3a1870, #180a3d);
  align-items: center; justify-content: center;
  font-size: 65px;
  box-shadow: 0 0 28px rgba(255,165,0,.45);
}

/* expression overlays */
#expr {
  position: absolute; inset: 0;
  border-radius: 50%; overflow: hidden;
  pointer-events: none;
}
#joy-tint {
  position: absolute; inset: 0;
  background: radial-gradient(circle, rgba(255,40,0,.32) 0%, transparent 72%);
  opacity: 0; transition: opacity .1s; mix-blend-mode: screen;
}
#egg-tint {
  position: absolute; inset: 0;
  background: radial-gradient(circle, rgba(255,220,0,.25) 0%, transparent 72%);
  opacity: 0; transition: opacity .1s; mix-blend-mode: screen;
}
#tongue {
  position: absolute;
  bottom: 20%; left: 50%;
  font-size: clamp(20px, 5.5vw, 27px);
  transform: translateX(-50%) scaleY(0);
  transform-origin: top center;
  z-index: 5;
}
#tongue.lick { animation: lick .95s ease-in-out forwards; }
@keyframes lick {
  0%   { transform: translateX(-50%) scaleY(0); }
  28%  { transform: translateX(-62%) scaleY(1.1) rotate(-18deg); }
  55%  { transform: translateX(-38%) scaleY(1) rotate(18deg); }
  78%  { transform: translateX(-56%) scaleY(.85) rotate(-10deg); }
  100% { transform: translateX(-50%) scaleY(0); }
}
#lipsync {
  position: absolute;
  bottom: 23%; left: 50%;
  transform: translateX(-50%);
  width: 27%; height: 0;
  background: rgba(80,0,0,.72);
  border-radius: 4px;
  transition: height .07s, width .07s;
  z-index: 4;
}

/* face animation */
@keyframes joy-anim {
  0%   { transform: scale(1) rotate(0deg);    filter: brightness(1) saturate(1); }
  18%  { transform: scale(1.1) rotate(-4deg); filter: brightness(1.45) saturate(1.9) hue-rotate(12deg); }
  36%  { transform: scale(1.13) rotate(3.5deg); filter: brightness(1.55) saturate(2.1) hue-rotate(-6deg); }
  52%  { transform: scale(1.09) rotate(-2.5deg); filter: brightness(1.4) saturate(1.7) hue-rotate(8deg); }
  70%  { transform: scale(1.1) rotate(2deg);  filter: brightness(1.3) saturate(1.4); }
  88%  { transform: scale(1.03) rotate(-1deg); filter: brightness(1.15) saturate(1.2); }
  100% { transform: scale(1) rotate(0deg);    filter: brightness(1) saturate(1); }
}
@keyframes egg-anim {
  0%   { transform: scale(1);      filter: brightness(1) saturate(1); }
  22%  { transform: scale(1.07);   filter: brightness(1.28) saturate(1.45) hue-rotate(-18deg); }
  55%  { transform: scale(1.09);   filter: brightness(1.35) saturate(1.6) hue-rotate(-22deg); }
  82%  { transform: scale(1.05);   filter: brightness(1.2) saturate(1.3) hue-rotate(-12deg); }
  100% { transform: scale(1);      filter: brightness(1) saturate(1); }
}
#aron-img.joy  { animation: joy-anim  1.15s ease-in-out forwards; }
#aron-img.eggs { animation: egg-anim  1.15s ease-in-out forwards; }

/* ── Streak text ── */
#streak-text {
  position: fixed;
  bottom: clamp(14px, 4vh, 28px); left: 50%;
  transform: translateX(-50%);
  font-size: clamp(1rem, 4.5vw, 1.45rem);
  font-weight: 900; letter-spacing: 1px;
  color: #ff4400;
  text-shadow: 0 0 10px #ff8800, 0 0 22px #ffcc00;
  white-space: nowrap;
  opacity: 0; pointer-events: none;
  z-index: 60; transition: opacity .3s;
}
#streak-text.on {
  opacity: 1;
  animation: streak-pop .45s ease-in-out infinite alternate;
}
@keyframes streak-pop {
  from { transform: translateX(-50%) scale(1);    text-shadow: 0 0 10px #ff4400; }
  to   { transform: translateX(-50%) scale(1.06); text-shadow: 0 0 22px #ff8800, 0 0 44px #ffcc00; }
}

/* ── Fade overlay ── */
#fade {
  position: fixed; inset: 0;
  background: #000; opacity: 0;
  pointer-events: none; z-index: 200;
  transition: opacity .32s ease-in-out;
}
#fade.on { opacity: 1; pointer-events: all; }

/* ── End screen ── */
#end {
  display: none; position: fixed; inset: 0; z-index: 100;
  background: linear-gradient(135deg, #0d0221 0%, #1c0a45 50%, #0d0221 100%);
  flex-direction: column; align-items: center; justify-content: center;
  padding: 30px 22px; text-align: center;
}
#end.on { display: flex; }

#end-stars { position: absolute; inset: 0; overflow: hidden; pointer-events: none; }
.s {
  position: absolute; background: #fff; border-radius: 50%;
  animation: twinkle 2s ease-in-out infinite;
}
@keyframes twinkle {
  0%,100% { opacity: .15; transform: scale(1); }
  50%      { opacity: 1;   transform: scale(1.6); }
}

#end-congrats {
  font-size: clamp(1.8rem, 7.5vw, 2.8rem);
  color: #ffd700;
  text-shadow: 0 0 30px #ff8c00;
  margin-bottom: 12px; position: relative; z-index: 1;
}
#end-body {
  font-size: clamp(1rem, 4vw, 1.35rem);
  color: #fff; line-height: 1.7;
  position: relative; z-index: 1;
}
#winner {
  display: inline-block;
  font-size: clamp(1.5rem, 7vw, 2.4rem);
  font-weight: 900;
  animation: rainbow 1.4s linear infinite;
  text-shadow: 0 0 18px currentColor;
  margin: 4px 0;
}
@keyframes rainbow {
  0%   { color:#ff0000; } 14%  { color:#ff8800; }
  28%  { color:#ffff00; } 42%  { color:#00ee44; }
  57%  { color:#00aaff; } 71%  { color:#6644ff; }
  85%  { color:#ff00cc; } 100% { color:#ff0000; }
}
#end-score {
  font-size: clamp(.85rem, 3.2vw, 1rem);
  color: rgba(255,255,255,.55);
  margin: 14px 0; position: relative; z-index: 1;
}
#again-btn {
  margin-top: 18px;
  padding: clamp(12px,3.8vw,18px) clamp(28px,9vw,48px);
  font-size: clamp(1.05rem, 4.5vw, 1.45rem);
  font-weight: 900; letter-spacing: 1px; text-transform: uppercase;
  background: linear-gradient(135deg, #ff6600, #ff0066);
  color: #fff; border: none; border-radius: 40px;
  cursor: pointer;
  box-shadow: 0 6px 0 rgba(0,0,0,.45), 0 9px 26px rgba(255,80,0,.5);
  transition: transform .08s, box-shadow .08s;
  position: relative; z-index: 1; touch-action: manipulation;
}
#again-btn:active {
  transform: translateY(5px);
  box-shadow: 0 1px 0 rgba(0,0,0,.45), 0 3px 14px rgba(255,80,0,.4);
}

/* confetti */
.conf {
  position: absolute; opacity: 0; border-radius: 2px;
  animation: fall 3.2s ease-in forwards;
}
@keyframes fall {
  0%   { transform: translateY(-15px) rotate(0deg);   opacity: 1; }
  100% { transform: translateY(105vh) rotate(760deg); opacity: 0; }
}
</style>
</head>
<body>

<!-- ═══════════════ GAME SCREEN ═══════════════ -->
<div id="game-screen">

  <!-- Header -->
  <div id="morn-header">
    <div id="morn-title">MORN&nbsp;<span id="morn-num">1</span></div>
    <div id="morn-dots"></div>
  </div>

  <!-- Main row -->
  <div id="game-area">

    <!-- LEFT: laptop / p0rn -->
    <div class="choice-col">
      <div class="choice-count" id="porn-count">0</div>
      <div class="icon-btn" id="laptop-btn"
           ontouchstart="pick(event,'porn')" onclick="pick(event,'porn')">
        💻
        <div class="fire-ring"   id="porn-ring"></div>
        <div class="fire-emojis" id="porn-fire"></div>
      </div>
      <div class="icon-label">p0rn</div>
    </div>

    <!-- CENTER: Aron -->
    <div id="aron-col">
      <div id="aron-wrap">
        <img id="aron-img" src="aron.jpg" alt="Aron"
             onerror="this.style.display='none';document.getElementById('aron-fallback').style.display='flex'">
        <div id="aron-fallback">😲</div>
        <div id="expr">
          <div id="joy-tint"></div>
          <div id="egg-tint"></div>
          <div id="tongue">👅</div>
          <div id="lipsync"></div>
        </div>
      </div>
    </div>

    <!-- RIGHT: egg / eggs -->
    <div class="choice-col">
      <div class="choice-count" id="egg-count">0</div>
      <div class="icon-btn" id="egg-btn"
           ontouchstart="pick(event,'egg')" onclick="pick(event,'egg')">
        🥚
        <div class="fire-ring"   id="egg-ring"></div>
        <div class="fire-emojis" id="egg-fire"></div>
      </div>
      <div class="icon-label">eggs</div>
    </div>

  </div><!-- /game-area -->
</div><!-- /game-screen -->

<!-- Streak text (fixed) -->
<div id="streak-text"></div>

<!-- ═══════════════ END SCREEN ═══════════════ -->
<div id="end">
  <div id="end-stars"></div>
  <div id="end-congrats">🎉 Congratulations! 🎉</div>
  <div id="end-body">
    Aron Korn prefers<br>
    <span id="winner">p0rn</span><br>
    in the morn!
  </div>
  <div id="end-score"></div>
  <button id="again-btn"
          ontouchstart="restart(event)" onclick="restart(event)">
    ▶ Play Again!
  </button>
</div>

<!-- Fade overlay -->
<div id="fade"></div>

<!-- ═══════════════ SCRIPT ═══════════════ -->
<script>
'use strict';

// ─── State ───────────────────────────────────────────────────
const MAX_MORNS = 10;
let G = fresh();
function fresh() {
  return { morn:1, porn:0, egg:0, pornStreak:0, eggStreak:0,
           busy:false, over:false };
}

// ─── Double-tap guard ─────────────────────────────────────────
let lastPickTime = 0;
let lastPickType = '';

// ─── Audio context ────────────────────────────────────────────
let AC = null;
function ac() {
  if (!AC) AC = new (window.AudioContext || window.webkitAudioContext)();
  if (AC.state === 'suspended') AC.resume();
  return AC;
}

// ─── Sounds ──────────────────────────────────────────────────
function sndClick() {
  try {
    const c = ac(), t = c.currentTime;
    const o = c.createOscillator(), g = c.createGain();
    o.connect(g); g.connect(c.destination);
    o.frequency.setValueAtTime(880, t);
    o.frequency.exponentialRampToValueAtTime(140, t + .13);
    g.gain.setValueAtTime(.38, t);
    g.gain.exponentialRampToValueAtTime(.001, t + .16);
    o.start(t); o.stop(t + .16);
  } catch(e){}
}

function sndFire() {
  try {
    const c = ac(), sr = c.sampleRate;
    const dur = 1.9, n = sr * dur | 0;
    const buf = c.createBuffer(1, n, sr);
    const d = buf.getChannelData(0);
    let last = 0;
    for (let i = 0; i < n; i++) {
      const w = Math.random() * 2 - 1;
      d[i] = (last + .022 * w) / 1.022;
      last = d[i];
      const env = Math.min(i / (sr * .08), 1) * Math.exp(-i / (sr * .55));
      d[i] *= env * 9;
    }
    // crackle pops
    for (let k = 0; k < 18; k++) {
      const p = Math.random() * n * .65 | 0;
      const amp = Math.random() * .55 + .18;
      for (let j = 0; j < 22; j++) if (p+j < n) d[p+j] += (Math.random()*2-1)*amp;
    }
    const src = c.createBufferSource(); src.buffer = buf;
    const flt = c.createBiquadFilter();
    flt.type = 'bandpass'; flt.frequency.value = 370; flt.Q.value = .75;
    const g = c.createGain();
    g.gain.setValueAtTime(.52, c.currentTime);
    g.gain.exponentialRampToValueAtTime(.001, c.currentTime + dur);
    src.connect(flt); flt.connect(g); g.connect(c.destination);
    src.start();
  } catch(e){}
}

// ─── Speech ──────────────────────────────────────────────────
function speak(text, pitch, rate, lipDur) {
  try {
    window.speechSynthesis.cancel();
    const u = new SpeechSynthesisUtterance(text);
    u.pitch = pitch; u.rate = rate; u.volume = 1;
    const voices = window.speechSynthesis.getVoices();
    const pick = voices.find(v => /male/i.test(v.name) && v.lang.startsWith('en'))
              || voices.find(v => v.lang.startsWith('en'));
    if (pick) u.voice = pick;
    window.speechSynthesis.speak(u);
    if (lipDur) animateLips(lipDur);
  } catch(e){}
}

// ─── Lip sync ─────────────────────────────────────────────────
let lipTimer = null;
function animateLips(ms) {
  const el = $('lipsync');
  if (lipTimer) clearInterval(lipTimer);
  const steps = ms / 75 | 0;
  let i = 0;
  lipTimer = setInterval(() => {
    if (i++ >= steps) {
      clearInterval(lipTimer); lipTimer = null;
      el.style.height = '0'; el.style.width = '27%'; return;
    }
    if (Math.random() > .3) {
      el.style.height = (Math.random()*13+4) + 'px';
      el.style.width  = (Math.random()*14+20) + '%';
    } else {
      el.style.height = '0';
    }
  }, 75);
}

// ─── Fire ring builder ────────────────────────────────────────
function buildRing(el) {
  el.innerHTML = '';
  for (let i = 0; i < 8; i++) {
    const a = (i/8)*Math.PI*2;
    const r = 50; // % offset from center
    const x = Math.cos(a)*r, y = Math.sin(a)*r;
    const s = document.createElement('span');
    s.className = 'fire-em'; s.textContent = '🔥';
    s.style.cssText = `margin-left:${x.toFixed(1)}%;margin-top:${y.toFixed(1)}%;transform:translate(-50%,-50%)`;
    el.appendChild(s);
  }
}

// ─── Streak ───────────────────────────────────────────────────
function handleStreak(type) {
  if (type === 'porn') { G.pornStreak++; G.eggStreak = 0; }
  else                 { G.eggStreak++;  G.pornStreak = 0; }

  const streak = type === 'porn' ? G.pornStreak : G.eggStreak;
  if (streak >= 3) showStreak(type);
  else             clearStreak();
}

function showStreak(type) {
  const el = $('streak-text');
  el.textContent = type === 'porn' ? '🔥 P0rn streak! 🔥' : '🔥 Egg streak! 🔥';
  el.classList.add('on');

  $('porn-ring').classList[type==='porn'?'add':'remove']('active');
  $('porn-fire').classList[type==='porn'?'add':'remove']('active');
  $('egg-ring').classList[type==='egg'?'add':'remove']('active');
  $('egg-fire').classList[type==='egg'?'add':'remove']('active');

  sndFire();
}
function clearStreak() {
  $('streak-text').classList.remove('on');
  ['porn-ring','porn-fire','egg-ring','egg-fire'].forEach(id => $(id).classList.remove('active'));
}

// ─── Main pick handler ────────────────────────────────────────
function pick(evt, type) {
  // prevent both ontouchstart AND onclick firing on same tap
  if (evt.type === 'click' && evt.sourceCapabilities && evt.sourceCapabilities.firesTouchEvents) return;
  const now = Date.now();
  if (now - lastPickTime < 350 && lastPickType === type) return;
  lastPickTime = now; lastPickType = type;

  if (G.busy || G.over) return;
  G.busy = true;
  ac(); // wake up audio

  // 1. Button press
  const btn = $(type === 'porn' ? 'laptop-btn' : 'egg-btn');
  btn.classList.add('pressed');
  setTimeout(() => btn.classList.remove('pressed'), 190);
  sndClick();

  // 2. Counter
  if (type === 'porn') {
    G.porn++;
    const el = $('porn-count'); el.textContent = G.porn; bump(el);
  } else {
    G.egg++;
    const el = $('egg-count'); el.textContent = G.egg; bump(el);
  }

  // 3. Streak
  handleStreak(type);

  // 4. Face + voice
  const img = $('aron-img');
  img.classList.remove('joy','eggs');
  void img.offsetWidth; // reflow

  if (type === 'porn') {
    img.classList.add('joy');
    $('joy-tint').style.opacity = '1';
    speak('Ohhh, yeah', .62, .52, 1450);
    setTimeout(() => { img.classList.remove('joy'); $('joy-tint').style.opacity='0'; }, 1200);
  } else {
    img.classList.add('eggs');
    $('egg-tint').style.opacity = '1';
    speak('Mmmm!', .78, .48, 0);
    const t = $('tongue');
    t.classList.remove('lick'); void t.offsetWidth; t.classList.add('lick');
    setTimeout(() => {
      t.classList.remove('lick');
      img.classList.remove('eggs');
      $('egg-tint').style.opacity = '0';
    }, 1200);
  }

  // 5. Fade → advance morn
  setTimeout(() => fade(() => {
    G.morn++;
    if (G.morn > MAX_MORNS) {
      endGame();
    } else {
      $('morn-num').textContent = G.morn;
      updateDots();
      G.busy = false;
    }
  }), 1320);
}

function bump(el) {
  el.classList.remove('bump'); void el.offsetWidth;
  el.classList.add('bump');
  setTimeout(() => el.classList.remove('bump'), 280);
}

// ─── Fade in/out ─────────────────────────────────────────────
function fade(midFn) {
  const el = $('fade');
  el.classList.add('on');
  setTimeout(() => {
    midFn();
    setTimeout(() => {
      el.classList.remove('on');
      setTimeout(() => { G.busy = false; }, 320);
    }, 140);
  }, 320);
}

// ─── End game ────────────────────────────────────────────────
function endGame() {
  G.over = true;
  clearStreak();

  const w = G.porn > G.egg ? 'p0rn' : G.egg > G.porn ? 'eggs' : 'p0rn and eggs';
  $('winner').textContent = w;
  $('end-score').textContent = `p0rn: ${G.porn}  |  eggs: ${G.egg}`;

  confetti();
  $('end').classList.add('on');
  G.busy = false;
}

function confetti() {
  const container = $('end');
  const colors = ['#ff0000','#ff8800','#ffff00','#00ee44','#00aaff','#8844ff','#ff00cc'];
  for (let i = 0; i < 55; i++) {
    setTimeout(() => {
      const el = document.createElement('div');
      el.className = 'conf';
      const sz = Math.random()*8+4;
      el.style.cssText = `
        left:${Math.random()*100}%;top:-12px;
        width:${sz}px;height:${sz}px;
        background:${colors[Math.random()*colors.length|0]};
        border-radius:${Math.random()>.5?'50%':'2px'};
        animation-duration:${Math.random()*2+2.2}s;
        animation-delay:${Math.random()*.4}s;
      `;
      container.appendChild(el);
      setTimeout(() => el.remove(), 4500);
    }, i * 45);
  }
}

// ─── Restart ─────────────────────────────────────────────────
function restart(evt) {
  if (evt.type === 'click' && evt.sourceCapabilities && evt.sourceCapabilities.firesTouchEvents) return;
  G = fresh();
  $('morn-num').textContent = '1';
  $('porn-count').textContent = '0';
  $('egg-count').textContent = '0';
  updateDots();
  clearStreak();
  $('end').classList.remove('on');
}

// ─── Morn dots ───────────────────────────────────────────────
function updateDots() {
  const container = $('morn-dots');
  container.innerHTML = '';
  for (let i = 1; i <= MAX_MORNS; i++) {
    const d = document.createElement('div');
    d.className = 'dot' + (i < G.morn ? ' done' : '');
    container.appendChild(d);
  }
}

// ─── Utility ─────────────────────────────────────────────────
function $(id) { return document.getElementById(id); }

// ─── Init ────────────────────────────────────────────────────
document.addEventListener('DOMContentLoaded', () => {
  buildRing($('porn-fire'));
  buildRing($('egg-fire'));
  updateDots();

  // End-screen stars
  const stars = $('end-stars');
  for (let i = 0; i < 45; i++) {
    const s = document.createElement('div');
    s.className = 's';
    const sz = Math.random()*3+1;
    s.style.cssText = `
      left:${Math.random()*100}%;top:${Math.random()*100}%;
      width:${sz}px;height:${sz}px;
      animation-delay:${Math.random()*2}s;
      animation-duration:${Math.random()*2+1.4}s;
    `;
    stars.appendChild(s);
  }

  // Pre-warm speech voices
  if ('speechSynthesis' in window) {
    window.speechSynthesis.getVoices();
    window.speechSynthesis.onvoiceschanged = () => window.speechSynthesis.getVoices();
  }
});
</script>
</body>
